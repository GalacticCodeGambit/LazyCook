services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile-frontend
    ports:
      - "8000:8000"
    depends_on:
      - backend-dev

  backend-dev:
    build:
      context: .
      dockerfile: Dockerfile-backend
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:8000}
    volumes:
      - ./data:/data
    ports:
      - "3000:3000"

